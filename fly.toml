app = "cozy-corner"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Required secrets (set via `fly secrets set`):
#   APP_URL       - Public URL of the app (e.g. https://cozy-corner.fly.dev)
#   SERVICE_DID   - AT Protocol service DID for authentication

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Nitro with TanStack Start outputs built assets to .output/public/
[[statics]]
  guest_path = "/app/.output/public/assets"
  url_prefix = "/assets"
